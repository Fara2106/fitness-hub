<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lorenzo Fitness Hub</title>
<meta name="description" content="Piano alimentare, allenamento e tracking personale" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fitness Hub" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body, #root { height: 100%; margin: 0; background: var(--bg, #0a0a0a); }
  #root { display: flex; align-items: stretch; }
  /* Desktop: no rounded corners */
  .lfh.desktop { border-radius: 0 !important; box-shadow: none !important; }
  /* iOS safe areas */
  .lfh.mobile {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- ResizeObserver loop fix -->
<script>
(function() {
  const RO = window.ResizeObserver;
  if (!RO) return;
  window.ResizeObserver = class extends RO {
    constructor(cb) {
      super((entries, obs) => { requestAnimationFrame(() => { try { cb(entries, obs); } catch(_) {} }); });
    }
  };
  const swallow = (e) => {
    const msg = (e && (e.message || (e.reason && e.reason.message))) || '';
    if (msg.indexOf('ResizeObserver loop') !== -1) { e.stopImmediatePropagation(); e.preventDefault && e.preventDefault(); }
  };
  window.addEventListener('error', swallow, true);
  window.addEventListener('unhandledrejection', swallow, true);
})();
</script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Recharts (jsdelivr è più affidabile di unpkg) -->

<script>if (typeof Recharts !== 'undefined') window.Recharts = Recharts;</script>

<script type="text/babel" src="storage.jsx"></script>
<script type="text/babel" src="api.jsx"></script>

<!-- Components -->
<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="anatomy.jsx"></script>
<script type="text/babel" src="nav.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens/onboarding.jsx"></script>
<script type="text/babel" src="screens/dashboard.jsx"></script>
<script type="text/babel" src="screens/scheda.jsx"></script>
<script type="text/babel" src="screens/dieta.jsx"></script>
<script type="text/babel" src="screens/spesa.jsx"></script>
<script type="text/babel" src="screens/coach.jsx"></script>

<!-- App frame -->
<script type="text/babel" src="app.jsx"></script>

<!-- Mount: auto-detect device -->
<script type="text/babel" data-presets="env,react">
const _isMobile = window.innerWidth < 768
  || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

ReactDOM.createRoot(document.getElementById("root")).render(
  <div style={{ width: "100%", height: "100%" }}>
    <AppFrame device={_isMobile ? "mobile" : "desktop"} />
  </div>
);
</script>
<!-- Service Worker (PWA offline support) -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] Registrato:', reg.scope))
      .catch(err => console.warn('[SW] Errore registrazione:', err));
  });
}
</script>
</body>
</html>
