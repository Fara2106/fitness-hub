<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<!-- Content-Security-Policy (difesa in profondità). connect-src BLINDATO ai soli
     host legittimi (proxy Sheets, worker push, Groq) → anche se venisse iniettato
     codice, non potrebbe esfiltrare dati verso domini terzi. script-src SENZA
     'unsafe-eval' (JSX precompilato al deploy in app.compiled.js) e SENZA
     'unsafe-inline' (bootstrap esternalizzati in boot-theme.js/boot.js): può
     eseguire SOLO script self + le due CDN (con SRI). style-src tiene
     'unsafe-inline' (stili inline React). object-src none, base-uri self
     bloccano vettori classici. NB: frame-ancestors/X-Frame non sono impostabili
     via <meta> su GitHub Pages. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://fitness-hub-proxy.lorefara97.workers.dev https://fitness-hub-push.lorefara97.workers.dev https://api.groq.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" />
<!-- maximum-scale=1 + user-scalable=no: blocca il pinch-zoom E l'auto-zoom iOS sul focus
     degli input (che, con #root a posizione fissa, lasciava una fascia vuota in basso).
     In PWA standalone iOS rispetta questi vincoli. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Lorenzo Fitness Hub</title>
<meta name="description" content="Piano alimentare, allenamento e tracking personale" />
<!-- theme-color con media: iOS PWA standalone valuta questi staticamente e li onora
     (a differenza degli update JS runtime, che iOS ignora → banda nera in entrambi i temi).
     Il JS sotto aggiorna comunque entrambi per i browser che lo onorano + override manuale. -->
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0b0f" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7fa" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fitness Hub" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="manifest" href="manifest.json" />
<!-- Preconnect: apre in anticipo TLS verso le CDN (React/Recharts/GSAP) e il
     proxy Sheets (primo sync) → prima richiesta più rapida a freddo. -->
<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://fitness-hub-proxy.lorefara97.workers.dev" crossorigin />
<link rel="stylesheet" href="styles.css?v=20260723201542" />
<style>
  /* Banda nera in basso su iOS standalone — CAUSA RADICE MISURATA on-device (PWA):
     innerH/clientH/height:100%/position:fixed;bottom:0/svh/dvh valgono TUTTI il viewport
     "piccolo" = 894, mentre lo schermo fisico (screenH) = 956 → i 62px in fondo restavano
     fuori dal viewport (dipinti neri da iOS) = la banda. MA `100vh` e `100lvh` misurano
     956 = schermo intero. FIX: il contenitore usa height:100vh→100lvh (956) invece di
     height:100% (894), così body/#root/.lfh/TabBar arrivano al fondo fisico e la banda
     sparisce. L'inset top (Dynamic Island) è assorbito dallo spacer StatusBar
     (env(safe-area-inset-top)); l'inset bottom (home-indicator) dal padding-bottom della
     TabBar. body overflow:hidden → lo scroll vive in .lfh-scroll. */
  html { height: 100vh; height: 100lvh; margin: 0; background: var(--safe-bg, #0b0b0f); }
  body {
    height: 100vh;                /* viewport grande = schermo intero su iOS standalone… */
    height: 100lvh;               /* …con lvh esplicito dove supportato (iOS ≥15.4) */
    margin: 0;
    overflow: hidden;             /* lo scroll vive in .lfh-scroll */
    background: var(--bg, #0b0b0f);
    display: flex;                /* body = contenitore a tutta altezza reale (956) */
    flex-direction: column;
  }
  #root {
    flex: 1 1 auto;               /* riempie body (956) → arriva al fondo fisico, niente banda */
    min-height: 0;
    display: flex;
    align-items: stretch;
    background: var(--bg, #0b0b0f);
  }
  /* Desktop: no rounded corners */
  .lfh.desktop { border-radius: 0 !important; box-shadow: none !important; }
  /* iOS safe areas: solo laterali sul contenitore.
     Gli inset top/bottom sono assorbiti da StatusBar (top) e TabBar (bottom),
     così non restano bande vuote di --bg (le "barre nere"). */
  .lfh.mobile {
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
</style>
<!-- Anti-flash tema: bloccante in head, PRIMA del primo paint. File esterno
     (non inline) → la CSP non ha bisogno di 'unsafe-inline' in script-src. -->
<script src="boot-theme.js?v=20260723201542"></script>
</head>
<body>
<div id="root"></div>

<!-- Bootstrap non-React (fix ResizeObserver, logger errori per la Diagnostica,
     registrazione SW + banner Aggiorna) — esternalizzato in boot.js per la CSP
     senza 'unsafe-inline'. Caricato PRIMA delle CDN e del bundle. -->
<script src="boot.js?v=20260723201542"></script>

<!-- React (production.min: build minificate + SRI; per debug locale si può
     tornare a *.development.js ricalcolando gli hash). Babel standalone NON c'è
     più: il JSX è precompilato al deploy in app.compiled.js (dev/build.mjs) →
     niente ~3 MB di compilatore né secondi di compile a ogni avvio. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>

<!-- Recharts NON è più caricato qui: ~500 KB usati solo da Storico → viene
     iniettato on-demand da window.ensureRecharts (ui.jsx) al primo ingresso
     in Storico, con gli stessi SRI. prop-types resta un suo prerequisito
     (globale window.PropTypes) e viene iniettato PRIMA da ensureRecharts. -->

<!-- GSAP core (motion premium). Se la CDN è bloccata l'app funziona identica: motion.jsx fa da guard. -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js" integrity="sha384-HOvlOYPIs/zjoIkWUGXkVmXsjr8GuZLV+Q+rcPwmJOVZVpvTSXQChiN4t9Euv9Vc" crossorigin="anonymous"></script>

<!-- App precompilata: UNICO bundle con tutti i .jsx (core → components →
     screens → app.jsx → mount.jsx), generato da dev/build.mjs (`npm run build`).
     L'ordine dei file vive in BUNDLE_FILES; il drift è coperto da npm test.
     ?v=20260723201542 versionato, bumpato a ogni deploy → niente cache stale. -->
<script src="app.compiled.js?v=20260723201542"></script>
<!-- La registrazione del Service Worker vive in boot.js (caricato in cima al body). -->
</body>
</html>
