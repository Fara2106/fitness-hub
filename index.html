<!-- Content-Security-Policy (difesa in profondità). connect-src BLINDATO ai soli
     host legittimi (proxy Sheets, worker push, Groq) → anche se venisse iniettato
     codice, non potrebbe esfiltrare dati verso domini terzi. script-src richiede
     'unsafe-inline' (script di bootstrap inline); NIENTE più 'unsafe-eval': il JSX
     è precompilato al deploy (app.compiled.js via dev/build.mjs), Babel standalone
     non esiste più a runtime. object-src none, base-uri self bloccano vettori classici.
     NB: frame-ancestors/X-Frame non sono impostabili via <meta> su GitHub Pages. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://fitness-hub-proxy.lorefara97.workers.dev https://fitness-hub-push.lorefara97.workers.dev https://api.groq.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" />
<!-- maximum-scale=1 + user-scalable=no: blocca il pinch-zoom E l'auto-zoom iOS sul focus
     degli input (che, con #root a posizione fissa, lasciava una fascia vuota in basso).
     In PWA standalone iOS rispetta questi vincoli. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

     Il JS sotto aggiorna comunque entrambi per i browser che lo onorano + override manuale. -->
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0b0f" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7fa" />

<style>
  /* Banda nera in basso su iOS standalone — CAUSA RADICE MISURATA on-device (PWA):
     innerH/clientH/height:100%/position:fixed;bottom:0/svh/dvh valgono TUTTI il viewport
     "piccolo" = 894, mentre lo schermo fisico (screenH) = 956 → i 62px in fondo restavano
     fuori dal viewport (dipinti neri da iOS) = la banda. MA `100vh` e `100lvh` misurano
     956 = schermo intero. FIX: il contenitore usa height:100vh→100lvh (956) invece di
     height:100% (894), così body/#root/.lfh/TabBar arrivano al fondo fisico e la banda
     sparisce. L'inset top (Dynamic Island) è assorbito dallo spacer StatusBar
     (env(safe-area-inset-top)); l'inset bottom (home-indicator) dal padding-bottom della
     TabBar. body overflow:hidden → lo scroll vive in .lfh-scroll. */
  html { height: 100vh; height: 100lvh; margin: 0; background: var(--safe-bg, #0b0b0f); }
  body {
    height: 100vh;                /* viewport grande = schermo intero su iOS standalone… */
    height: 100lvh;               /* …con lvh esplicito dove supportato (iOS ≥15.4) */
    margin: 0;
    overflow: hidden;             /* lo scroll vive in .lfh-scroll */
    background: var(--bg, #0b0b0f);
    display: flex;                /* body = contenitore a tutta altezza reale (956) */
    flex-direction: column;
  }
  #root {
    flex: 1 1 auto;               /* riempie body (956) → arriva al fondo fisico, niente banda */
    min-height: 0;
    display: flex;
    align-items: stretch;
    background: var(--bg, #0b0b0f);
  }
  /* Desktop: no rounded corners */
  .lfh.desktop { border-radius: 0 !important; box-shadow: none !important; }
  /* iOS safe areas: solo laterali sul contenitore.
     Gli inset top/bottom sono assorbiti da StatusBar (top) e TabBar (bottom),
     così non restano bande vuote di --bg (le "barre nere"). */
  .lfh.mobile {
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
</style>
<script>
/* Tema di sistema PRIMA del mount React (evita flash di tema sbagliato).
   Il tema salvato dall'utente (storage IndexedDB) viene riapplicato da
   _applyTheme appena l'app è pronta; default = "system" (segue macOS/iOS). */
(function() {
  try {
    var light = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
    if (light) document.documentElement.classList.add("theme-light");
    /* tono TabBar (non --bg): iOS usa theme-color per la striscia della home-indicator,
       che la pagina NON può dipingere → così si fonde con la barra. Aggiorna TUTTI i meta
       theme-color (i due media-scoped) per i browser che onorano il JS. */
    var metas = document.querySelectorAll('meta[name="theme-color"]');
    for (var i = 0; i < metas.length; i++) metas[i].setAttribute("content", light ? "#f7f7fa" : "#0b0b0f");
  } catch (_) {}
})();
</script>
</head>
<body>
<div id="root"></div>

<!-- ResizeObserver loop fix -->
<script>
(function() {
  const RO = window.ResizeObserver;
  if (!RO) return;
  window.ResizeObserver = class extends RO {
    constructor(cb) {
      super((entries, obs) => { requestAnimationFrame(() => { try { cb(entries, obs); } catch(_) {} }); });
    }
  };
  const swallow = (e) => {
    const msg = (e && (e.message || (e.reason && e.reason.message))) || '';
    if (msg.indexOf('ResizeObserver loop') !== -1) { e.stopImmediatePropagation(); e.preventDefault && e.preventDefault(); }
  };
  window.addEventListener('error', swallow, true);
  window.addEventListener('unhandledrejection', swallow, true);
})();
</script>

<!-- Log errori locale (Impostazioni → Diagnostica). Registrato DOPO lo swallow
     ResizeObserver (che ferma la propagazione dei suoi falsi positivi). Tiene
     gli ultimi 50 errori JS in window._errLog e li persiste in storage
     ("errorLog") appena IndexedDB è pronto: i bug solo-iOS diventano leggibili
     dal device invece di restare invisibili. -->
<script>
(function () {
  var MAX = 50;
  var LOG = window._errLog = [];
  var toFlush = [];
  function flush() {
    var st = window.storage;
    if (!st || !toFlush.length) return;
    if (!st.isReady()) { st.onReady(flush); return; }
    try {
      var prev = st.get("errorLog", []) || [];
      st.set("errorLog", prev.concat(toFlush).slice(-MAX));
      toFlush = [];
      window.dispatchEvent(new Event("lfh-err"));
    } catch (_) {}
  }
  function push(type, msg, stack) {
    try {
      var entry = {
        t: new Date().toISOString(),
        type: type,
        msg: String(msg || "").slice(0, 300),
        stack: String(stack || "").slice(0, 600),
      };
      LOG.push(entry);
      if (LOG.length > MAX) LOG.shift();
      toFlush.push(entry);
      flush();
    } catch (_) {}
  }
  window.addEventListener("error", function (e) {
    if (!e || !e.message) return; // gli errori di caricamento risorse non arrivano qui (no bubble)
    var where = e.filename ? " @ " + String(e.filename).split("/").pop() + ":" + e.lineno : "";
    push("error", e.message + where, e.error && e.error.stack);
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = e && e.reason;
    push("promise", (r && (r.message || r)) || "unhandledrejection", r && r.stack);
  });
})();
</script>

<!-- Service Worker (PWA offline support) -->
<script>
if ('serviceWorker' in navigator) {
  // Ricarica quando un nuovo SW prende il controllo (scatta DOPO che l'utente
  // tocca "Aggiorna" → SKIP_WAITING → il nuovo SW si attiva). Guard anti-loop.
  let _refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_refreshing) return;
    _refreshing = true;
    console.log('[SW] Nuovo SW attivo, ricarico...');
    window.location.reload();
  });

  // Ponte verso React: segnala che c'è un update pronto e come applicarlo.
  // Stesso schema del ponte sync ("lfh-sync"). _swUpdateReady copre il caso in
  // cui React monti DOPO l'evento (lo stato iniziale lo rilegge).
  function _promptUpdate(worker) {
    if (!worker) return;
    window._swApplyUpdate = () => worker.postMessage({ type: 'SKIP_WAITING' });
    window._swUpdateReady = true;
    try { window.dispatchEvent(new Event('lfh-sw-update')); } catch (_) {}
    console.log('[SW] Update disponibile, banner mostrato.');
  }

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        // reg può essere undefined se l'ambiente blocca i SW (es. automazione/test):
        // senza guard, reg.scope lancerebbe un TypeError confuso dentro il catch
        if (!reg) { console.warn('[SW] Registrazione bloccata dall\'ambiente (nessun registration object) — ok in test/automazione'); return; }
        console.log('[SW] Registrato:', reg.scope);
        // Controlla aggiornamenti subito e poi ogni 60s
        reg.update().catch(() => {});
        setInterval(() => reg.update().catch(() => {}), 60000);

        // Se un worker è già in attesa al load → update pronto.
        if (reg.waiting && navigator.serviceWorker.controller) _promptUpdate(reg.waiting);

        // Nuovo worker trovato: quando è "installed" E c'è già un controller
        // (= aggiornamento, non prima installazione) → mostra il banner.
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) _promptUpdate(nw);
          });
        });
      })
      .catch(err => console.warn('[SW] Registrazione non riuscita (normale se l\'ambiente blocca i service worker):', err && err.message ? err.message : err));
  });
}
</script>
