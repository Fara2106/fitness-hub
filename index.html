<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<!-- maximum-scale=1 + user-scalable=no: blocca il pinch-zoom E l'auto-zoom iOS sul focus
     degli input (che, con #root a posizione fissa, lasciava una fascia vuota in basso).
     In PWA standalone iOS rispetta questi vincoli. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Lorenzo Fitness Hub</title>
<meta name="description" content="Piano alimentare, allenamento e tracking personale" />
<!-- theme-color con media: iOS PWA standalone valuta questi staticamente e li onora
     (a differenza degli update JS runtime, che iOS ignora → banda nera in entrambi i temi).
     Il JS sotto aggiorna comunque entrambi per i browser che lo onorano + override manuale. -->
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0b0f" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7fa" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fitness Hub" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="styles.css?v=20260714151926" />
<style>
  /* Banda nera in basso su iOS standalone — CAUSA RADICE provata on-device con
     diagnostica a colori (banda = VERDE = body): #root con position:fixed NON arriva
     al fondo fisico dello schermo (iOS standalone lo vincola al viewport "safe"),
     mentre body height:100% SÌ → sotto #root spuntava lo sfondo scuro di body = la banda.
     FIX: niente più #root fixed. body è il contenitore flex a tutta altezza e #root lo
     riempie (flex:1) → arriva al fondo reale. La safe-area inferiore è coperta dal
     padding-bottom della TabBar; la sottile striscia home-indicator (non dipingibile
     dalla pagina) resta gestita da <meta theme-color> media-scoped.
     1) striscia sottile home-indicator → theme-color (sopra).
     2) fascia grande scura → risolta da body-flex + #root flex:1 (qui sotto). */
  html { height: 100%; margin: 0; background: var(--safe-bg, #0b0b0f); }
  body {
    height: 100%;
    margin: 0;
    overflow: hidden;             /* lo scroll vive in .lfh-scroll */
    background: var(--bg, #0b0b0f);
    display: flex;                /* body = contenitore a tutta altezza (raggiunge il fondo iOS) */
    flex-direction: column;
  }
  #root {
    flex: 1 1 auto;               /* riempie body → arriva al fondo fisico, niente banda */
    min-height: 0;
    display: flex;
    align-items: stretch;
    background: var(--bg, #0b0b0f);
  }
  /* Desktop: no rounded corners */
  .lfh.desktop { border-radius: 0 !important; box-shadow: none !important; }
  /* iOS safe areas: solo laterali sul contenitore.
     Gli inset top/bottom sono assorbiti da StatusBar (top) e TabBar (bottom),
     così non restano bande vuote di --bg (le "barre nere"). */
  .lfh.mobile {
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
</style>
<script>
/* Tema di sistema PRIMA del mount React (evita flash di tema sbagliato).
   Il tema salvato dall'utente (storage IndexedDB) viene riapplicato da
   _applyTheme appena l'app è pronta; default = "system" (segue macOS/iOS). */
(function() {
  try {
    var light = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
    if (light) document.documentElement.classList.add("theme-light");
    /* tono TabBar (non --bg): iOS usa theme-color per la striscia della home-indicator,
       che la pagina NON può dipingere → così si fonde con la barra. Aggiorna TUTTI i meta
       theme-color (i due media-scoped) per i browser che onorano il JS. */
    var metas = document.querySelectorAll('meta[name="theme-color"]');
    for (var i = 0; i < metas.length; i++) metas[i].setAttribute("content", light ? "#f7f7fa" : "#0b0b0f");
  } catch (_) {}
})();
</script>
</head>
<body>
<div id="root"></div>

<!-- ResizeObserver loop fix -->
<script>
(function() {
  const RO = window.ResizeObserver;
  if (!RO) return;
  window.ResizeObserver = class extends RO {
    constructor(cb) {
      super((entries, obs) => { requestAnimationFrame(() => { try { cb(entries, obs); } catch(_) {} }); });
    }
  };
  const swallow = (e) => {
    const msg = (e && (e.message || (e.reason && e.reason.message))) || '';
    if (msg.indexOf('ResizeObserver loop') !== -1) { e.stopImmediatePropagation(); e.preventDefault && e.preventDefault(); }
  };
  window.addEventListener('error', swallow, true);
  window.addEventListener('unhandledrejection', swallow, true);
})();
</script>

<!-- ===== SONDA GEOMETRIA (TEMPORANEA — da rimuovere dopo la diagnosi banda) =====
     Riquadro rosso in alto a sinistra: stampa le altezze reali sul device così
     capiamo esattamente dove l'app non arriva al fondo. -->
<script>
window.addEventListener('load', function () {
  var probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom);pointer-events:none;';
  document.body.appendChild(probe);
  var box = document.createElement('div');
  box.style.cssText = 'position:fixed;top:calc(env(safe-area-inset-top) + 6px);left:8px;z-index:2147483647;background:rgba(220,0,0,.9);color:#fff;font:12px/1.45 ui-monospace,monospace;padding:8px 10px;border-radius:8px;pointer-events:none;white-space:pre;';
  document.body.appendChild(box);
  // Barra magenta ancorata a bottom:0 → se raggiunge il fondo FISICO dello schermo,
  // allora bottom:0 tocca il fondo (banda dipingibile); se resta una striscia nera
  // SOTTO la magenta, quella striscia è fuori dal viewport (la dipinge iOS).
  var bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;left:0;right:0;bottom:0;height:46px;background:magenta;z-index:2147483646;pointer-events:none;';
  document.body.appendChild(bar);
  function bot(el){ return el ? Math.round(el.getBoundingClientRect().bottom) : -1; }
  function hgt(el){ return el ? Math.round(el.getBoundingClientRect().height) : -1; }
  function uh(unit){ var e=document.createElement('div'); e.style.cssText='position:fixed;top:0;left:0;width:1px;visibility:hidden;height:'+unit+';'; document.body.appendChild(e); var h=Math.round(e.getBoundingClientRect().height); e.remove(); return h; }
  function upd(){
    var root = document.getElementById('root');
    var nav  = document.querySelector('nav');
    box.textContent =
      'standalone=' + (navigator.standalone ? 'yes' : 'no') +
      '\ninnerH  =' + window.innerHeight +
      '\nscreenH =' + window.screen.height +
      '\nsafeBot =' + Math.round(probe.getBoundingClientRect().height) +
      '\nvh =' + uh('100vh') + ' svh=' + uh('100svh') +
      '\nlvh=' + uh('100lvh') + ' dvh=' + uh('100dvh') +
      '\nroot.bot=' + bot(root) +
      '\nnav.bot =' + bot(nav) +
      '\nbar.bot =' + bot(bar) + ' (magenta)';
  }
  setInterval(upd, 500); upd();
});
</script>

<!-- Mount: auto-detect device -->
<script type="text/babel" data-presets="env,react">
const _isMobile = window.innerWidth < 768
  || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

ReactDOM.createRoot(document.getElementById("root")).render(
  <div style={{ width: "100%", height: "100%" }}>
    <AppFrame device={_isMobile ? "mobile" : "desktop"} />
  </div>
);
</script>
<!-- Service Worker (PWA offline support) -->
<script>
if ('serviceWorker' in navigator) {
  // Rileva quando un nuovo SW prende il controllo → ricarica per avere codice aggiornato
  let _refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_refreshing) return;
    _refreshing = true;
    console.log('[SW] Nuovo SW attivo, ricarico...');
    window.location.reload();
  });

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        // reg può essere undefined se l'ambiente blocca i SW (es. automazione/test):
        // senza guard, reg.scope lancerebbe un TypeError confuso dentro il catch
        if (!reg) { console.warn('[SW] Registrazione bloccata dall\'ambiente (nessun registration object) — ok in test/automazione'); return; }
        console.log('[SW] Registrato:', reg.scope);
        // Controlla aggiornamenti subito e poi ogni 60s
        reg.update().catch(() => {});
        setInterval(() => reg.update().catch(() => {}), 60000);
      })
      .catch(err => console.warn('[SW] Registrazione non riuscita (normale se l\'ambiente blocca i service worker):', err && err.message ? err.message : err));
  });
}
</script>
